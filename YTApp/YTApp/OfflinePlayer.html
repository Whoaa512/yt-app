<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

.container { display: flex; flex-direction: column; height: 100vh; }

.player-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
    min-height: 0;
}

video {
    max-width: 100%;
    max-height: 100%;
    outline: none;
}

.info-bar {
    padding: 12px 16px;
    background: #141414;
    border-top: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 16px;
    min-height: 48px;
}

.info-title {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.info-channel {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
}

.info-duration {
    font-size: 12px;
    color: #666;
    font-variant-numeric: tabular-nums;
}

.playlist-bar {
    padding: 8px 16px;
    background: #111;
    border-top: 1px solid #1a1a1a;
    display: flex;
    gap: 8px;
    align-items: center;
}

.playlist-bar button {
    background: #222;
    border: none;
    color: #ccc;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.playlist-bar button:hover { background: #333; }
.playlist-bar button:disabled { opacity: 0.3; cursor: default; }

.playlist-label {
    font-size: 11px;
    color: #666;
    flex: 1;
    text-align: center;
}

.empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #444;
    font-size: 16px;
}
</style>
</head>
<body>
<div id="app">
    <div class="empty-state" id="empty">Drop a video or select from your library</div>
    <div class="container" id="player-container" style="display:none">
        <div class="player-area">
            <video id="video" controls></video>
        </div>
        <div class="info-bar">
            <span class="info-title" id="title"></span>
            <span class="info-channel" id="channel"></span>
            <span class="info-duration" id="duration"></span>
        </div>
        <div class="playlist-bar" id="playlist-bar" style="display:none">
            <button id="prev-btn" onclick="playPrev()">⏮ Prev</button>
            <span class="playlist-label" id="playlist-label"></span>
            <button id="next-btn" onclick="playNext()">Next ⏭</button>
        </div>
    </div>
</div>

<script>
const video = document.getElementById('video');
const container = document.getElementById('player-container');
const empty = document.getElementById('empty');

let playlist = [];
let currentIndex = -1;

function loadVideo(info) {
    empty.style.display = 'none';
    container.style.display = 'flex';

    video.src = info.filePath;
    document.getElementById('title').textContent = info.title || '';
    document.getElementById('channel').textContent = info.channel || '';
    document.getElementById('duration').textContent = info.duration || '';

    video.play().catch(() => {});
    updatePlaylistUI();
}

function loadPlaylist(items, startIndex) {
    playlist = items;
    currentIndex = startIndex || 0;
    if (playlist.length > 0) {
        loadVideo(playlist[currentIndex]);
    }
    updatePlaylistUI();
}

function playNext() {
    if (currentIndex < playlist.length - 1) {
        currentIndex++;
        loadVideo(playlist[currentIndex]);
    }
}

function playPrev() {
    if (currentIndex > 0) {
        currentIndex--;
        loadVideo(playlist[currentIndex]);
    }
}

function updatePlaylistUI() {
    const bar = document.getElementById('playlist-bar');
    if (playlist.length <= 1) {
        bar.style.display = 'none';
        return;
    }
    bar.style.display = 'flex';
    document.getElementById('prev-btn').disabled = currentIndex <= 0;
    document.getElementById('next-btn').disabled = currentIndex >= playlist.length - 1;
    document.getElementById('playlist-label').textContent =
        `${currentIndex + 1} / ${playlist.length}`;
}

video.addEventListener('ended', () => {
    if (currentIndex < playlist.length - 1) playNext();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' && e.metaKey) { playNext(); e.preventDefault(); }
    if (e.key === 'ArrowLeft' && e.metaKey) { playPrev(); e.preventDefault(); }
    if (e.key === ' ' && !e.metaKey) {
        video.paused ? video.play() : video.pause();
        e.preventDefault();
    }
    if (e.key === 'f') { toggleFullscreen(); e.preventDefault(); }
});

function toggleFullscreen() {
    if (document.fullscreenElement) {
        document.exitFullscreen();
    } else {
        video.requestFullscreen();
    }
}

window.webkit && window.webkit.messageHandlers;
</script>
</body>
</html>
